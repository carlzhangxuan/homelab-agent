services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    environment:
      - OPENAI_API_BASE_URL=http://tools:8000/v1
      - OPENAI_API_KEY=dummy
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    depends_on:
      - tools

volumes:
  open-webui-data:
