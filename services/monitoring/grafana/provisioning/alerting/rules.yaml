apiVersion: 1

deleteRules:
  - orgId: 1
    uid: dummy-email-test

groups:
  - orgId: 1
    name: homelab-alerts
    folder: Homelab
    interval: 1m
    rules:
      - uid: host-offline
        title: Host Offline
        condition: C
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: homelab_host_online == 0
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Host {{ $labels.host }} is offline"
        labels:
          severity: warning

      - uid: cpu-temp-high
        title: CPU Temperature High
        condition: C
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: homelab_cpu_temp_c > 85
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "CPU temp on {{ $labels.host }} is {{ $values.A }}°C"
        labels:
          severity: warning

      - uid: gpu-temp-high
        title: GPU Temperature High
        condition: C
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: homelab_gpu_temp_c > 85
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "GPU temp on {{ $labels.host }} is {{ $values.A }}°C"
        labels:
          severity: critical
